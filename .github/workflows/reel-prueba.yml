# Prueba end-to-end del Reel vertical (gate del manual §13.1): 600 frames, 1 runner.
name: reel-prueba

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Instalar dependencias
        working-directory: video
        run: npm ci || npm install
      - name: Asegurar el navegador de Remotion
        working-directory: video
        run: npx remotion browser ensure
      - name: Renderizar Reel de prueba
        working-directory: video
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node render_reel.mjs
      - name: Subir artifact (respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: reel_prueba
          path: video/out/reel_prueba.mp4
